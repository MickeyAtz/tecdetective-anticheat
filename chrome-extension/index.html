<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>TEC Detective</title>
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <h1>TEC Detective</h1>
        <section id="form-section">
            <p id="form-title">
                Para continuar, agrega tu número de control, tu nombre y la clave del examen.
            </p>

            <div id="user-info" style="display: none">
                <p><strong>Usuario:</strong><span id="user-nombre"></span></p>
                <p><strong>No. Control: </strong><span id="user-control"></span></p>
                <button id="btn-logout">Cerrar sesión</button>
            </div>

            <div class="inputCombo" id="nControl-group">
                <label for="nControl">Número de control</label>
                <input type="text" id="nControl" placeholder="Ej: 220110064" required />
            </div>

            <div class="inputCombo" id="nombre-group">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" placeholder="Ej: Miguel Angel Alvarez" />
            </div>

            <div class="inputCombo" style="padding-top: 10px">
                <label for="claveExamen">Clave del examen</label>
                <input type="text" id="claveExamen" placeholder="Ej: CMADJQIR1231D" />
            </div>

            <button id="registroForm">Entrar</button>
        </section>

        <section id="status-section" style="display: none">
            <div class="status-card" id="status-card"></div>
        </section>
        <script src="popout.js" type="module"></script>
    </body>
</html>
